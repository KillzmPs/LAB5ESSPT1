name: Hello world

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  hello-world-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run a one-line script
        run: echo "Hello World"

  A:
    needs: hello-world-job
    runs-on: ubuntu-latest
    steps:
      - name: Job A
        run: echo "job A"

  B:
    needs: hello-world-job
    runs-on: ubuntu-latest
    steps:
      - name: Job B
        run: echo "job B"
